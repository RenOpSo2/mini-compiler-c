name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make
        
    - name: Build project
      run: make all
      
    - name: Run unit tests
      run: |
        make test
      
    - name: Run integration tests manually
      run: |
        # Test basic arithmetic operations
        echo "Testing: 10 + 5"
        ./compiler "10 + 5"
        
        echo "Testing: 10 - 5"  
        ./compiler "10 - 5"
        
        echo "Testing: 10 * 5"
        ./compiler "10 * 5"
        
        echo "Testing: 10 / 5"
        ./compiler "10 / 5"
        
        echo "Testing: (10 + 5) * 2"
        ./compiler "(10 + 5) * 2"
        
        echo "Testing: 10 + 5 * 2 (precedence test)"
        ./compiler "10 + 5 * 2"
        
    - name: Check for build artifacts
      run: |
        ls -la
        echo "Build directory contents:"
        find build/ -type f
