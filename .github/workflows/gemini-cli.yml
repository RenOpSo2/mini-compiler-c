name: Gemini CLI
on: [issues, pull_request]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  gemini:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google/gemini-cli@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
